# Sub-action: cloudflare-pages — Deploy via Wrangler
# Lifted from openMF/mifos-x-actionhub-web-publish-kmp@v2.0.0 cloudflare-pages/
name: 'KMP Publish Web — Cloudflare Pages'
description: 'Deploy built web bundle to Cloudflare Pages via Wrangler.'
author: 'Mifos Initiative'
branding: { icon: 'cloud', color: 'orange' }

inputs:
  dist_dir:                   { required: true,  description: 'Path to the built web bundle' }
  cloudflare_pages_api_token: { required: true,  description: 'Cloudflare API token with Pages:Edit' }
  cloudflare_account_id:      { required: true,  description: 'Cloudflare account ID' }
  project_name:               { required: true,  description: 'Cloudflare Pages project name' }
  branch:                     { required: false, default: 'main', description: 'Deployment branch label' }

runs:
  using: 'composite'
  steps:
    - name: Verify dist dir exists
      shell: bash
      env: { DIST_DIR: '${{ inputs.dist_dir }}' }
      run: |
        if [ ! -d "$DIST_DIR" ]; then
          echo "ERROR: dist_dir not found: $DIST_DIR" >&2
          exit 1
        fi
        echo "Dist dir contents: $(ls -1 "$DIST_DIR" | wc -l) entries."

    - name: Deploy via Wrangler
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken:  ${{ inputs.cloudflare_pages_api_token }}
        accountId: ${{ inputs.cloudflare_account_id }}
        command: pages deploy ${{ inputs.dist_dir }} --project-name=${{ inputs.project_name }} --branch=${{ inputs.branch }}
