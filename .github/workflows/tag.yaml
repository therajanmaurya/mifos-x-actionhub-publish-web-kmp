# .github/workflows/tag.yaml
#
# Manually-fired version tagger. Cuts v2.0.X tags + updates rolling @v2 pointer.
# NOT auto-triggered on push (avoids spurious patches on every chore commit).
# Maintainer dispatches via `gh workflow run tag.yaml -f bump=patch|minor|major`.
name: Tag Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: false
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Compute next version
        id: bump
        run: |
          set -euo pipefail
          LATEST=$(git tag -l 'v2.*' | grep -v '^v2$' | sort -V | tail -1)
          LATEST=${LATEST:-v2.0.0}
          BUMP_KIND="${{ inputs.bump }}"
          IFS='.' read -r MAJ MIN PAT <<< "${LATEST#v}"
          case "$BUMP_KIND" in
            patch) PAT=$((PAT + 1)) ;;
            minor) MIN=$((MIN + 1)); PAT=0 ;;
            major) MAJ=$((MAJ + 1)); MIN=0; PAT=0 ;;
          esac
          NEXT="v${MAJ}.${MIN}.${PAT}"
          echo "next=$NEXT"  >> "$GITHUB_OUTPUT"
          echo "major=v$MAJ" >> "$GITHUB_OUTPUT"
          echo "📦 Latest: $LATEST → Next: $NEXT"

      - name: Create tag + rolling major + GH Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT:  ${{ steps.bump.outputs.next }}
          MAJOR: ${{ steps.bump.outputs.major }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT"  -m "Release $NEXT"
          git tag -f "$MAJOR" -m "Rolling pointer to latest $MAJOR.x.y"
          git push origin "$NEXT"
          git push -f origin "$MAJOR"
          gh release create "$NEXT" --title "$NEXT" --notes "See [CHANGELOG.md](./CHANGELOG.md)."
