# .github/workflows/release-web.yaml
#
# ADDITIVE — reusable workflow for Web direct-deploy ladder.
# Companion to existing build-and-deploy-site.yaml. Existing UNCHANGED.
#
# Promotion model (per host, branch-based for gh-pages):
#   Stage 1 (preview)     — gh-pages-preview branch
#   Stage 2 (staging)     — gh-pages-staging branch (promote = copy preview → staging)
#   Stage 3 (production)  — gh-pages branch (promote = copy staging → gh-pages)
name: Release · Web (ladder)
run-name: "🌐 Release Web ${{ inputs.host }} · ladder→${{ inputs.starting_rung }}"

on:
  workflow_call:
    inputs:
      host:
        description: "Host: gh-pages | cloudflare-pages | netlify | vercel"
        required: false
        type: string
        default: 'gh-pages'
      web_package_name:
        description: 'Gradle module (e.g. cmp-web)'
        required: true
        type: string
      starting_rung:
        description: "Resume from: preview | staging | production"
        required: false
        type: string
        default: 'preview'

    secrets:
      cloudflare_api_token: { required: false }
      netlify_auth_token:   { required: false }
      vercel_token:         { required: false }

concurrency:
  group: release-web-${{ inputs.host }}
  cancel-in-progress: true

jobs:
  # Preflight: validate required secrets per host — fail-fast in ~5s instead of
  # dying deep in the deploy step. gh-pages needs nothing (uses GITHUB_TOKEN);
  # cloudflare-pages / netlify / vercel each need exactly one host-specific token.
  validate-secrets:
    name: Preflight · Validate required secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check web secrets per host
        env:
          cloudflare_api_token: ${{ secrets.cloudflare_api_token }}
          netlify_auth_token:   ${{ secrets.netlify_auth_token }}
          vercel_token:         ${{ secrets.vercel_token }}
        run: |
          MISSING=()
          case "${{ inputs.host }}" in
            gh-pages)
              echo "✅ gh-pages uses GITHUB_TOKEN — no extra secrets required"
              ;;
            cloudflare-pages)
              [[ -z "${cloudflare_api_token:-}" ]] && MISSING+=("cloudflare_api_token")
              ;;
            netlify)
              [[ -z "${netlify_auth_token:-}" ]] && MISSING+=("netlify_auth_token")
              ;;
            vercel)
              [[ -z "${vercel_token:-}" ]] && MISSING+=("vercel_token")
              ;;
          esac
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "❌ Web host=${{ inputs.host }} requires these secrets, but they are MISSING:"
            printf '   - %s\n' "${MISSING[@]}"
            echo ""
            echo "Set them in your repo's Settings → Secrets and variables → Actions:"
            for s in "${MISSING[@]}"; do echo "   gh secret set $s --repo \${{ github.repository }}"; done
            exit 1
          fi
          echo "✅ Web ${{ inputs.host }} secrets present"

  # ---------------------------------------------------------------------------
  # Per-host static-uses pattern (since v2.0.6):
  # GitHub Actions does NOT permit expression interpolation inside `uses:` — the
  # value must resolve to a literal at workflow parse time. The previous
  # `uses: therajanmaurya/mifos-x-actionhub-publish-web-kmp/${{ inputs.host }}@v2.0.0`
  # form was rejected by the parser with:
  #   "Unrecognized named-value: 'inputs'. Located at position 1
  #    within expression: inputs.host"
  # Replaced with one static-uses step per host, gated by `if: inputs.host == '…'`.
  # Only the matching step actually runs per dispatch.
  # ---------------------------------------------------------------------------

  stage-1-preview:
    name: Stage 1 — Preview
    needs: [validate-secrets]
    if: contains(fromJSON('["preview","staging","production"]'), inputs.starting_rung)
    runs-on: ubuntu-latest
    environment: web-${{ inputs.host }}-preview
    permissions: { contents: write, pages: write, id-token: write }
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to preview (gh-pages)
        if: inputs.host == 'gh-pages'
        uses: therajanmaurya/mifos-x-actionhub-publish-web-kmp/gh-pages@v2.0.0
        with:
          web_package_name: ${{ inputs.web_package_name }}
          target_stage:     preview

      - name: Deploy to preview (cloudflare-pages)
        if: inputs.host == 'cloudflare-pages'
        uses: therajanmaurya/mifos-x-actionhub-publish-web-kmp/cloudflare-pages@v2.0.0
        with:
          web_package_name: ${{ inputs.web_package_name }}
          target_stage:     preview

      - name: Deploy to preview (netlify)
        if: inputs.host == 'netlify'
        uses: therajanmaurya/mifos-x-actionhub-publish-web-kmp/netlify@v2.0.0
        with:
          web_package_name: ${{ inputs.web_package_name }}
          target_stage:     preview

      - name: Deploy to preview (vercel)
        if: inputs.host == 'vercel'
        uses: therajanmaurya/mifos-x-actionhub-publish-web-kmp/vercel@v2.0.0
        with:
          web_package_name: ${{ inputs.web_package_name }}
          target_stage:     preview

  stage-2-staging:
    name: Stage 2 — Staging
    needs: [stage-1-preview]
    if: contains(fromJSON('["staging","production"]'), inputs.starting_rung) && !cancelled() && !failure()
    runs-on: ubuntu-latest
    environment: web-${{ inputs.host }}-staging
    permissions: { contents: write, pages: write, id-token: write }
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging (gh-pages)
        if: inputs.host == 'gh-pages'
        uses: therajanmaurya/mifos-x-actionhub-publish-web-kmp/gh-pages@v2.0.0
        with:
          web_package_name: ${{ inputs.web_package_name }}
          target_stage:     staging

      - name: Deploy to staging (cloudflare-pages)
        if: inputs.host == 'cloudflare-pages'
        uses: therajanmaurya/mifos-x-actionhub-publish-web-kmp/cloudflare-pages@v2.0.0
        with:
          web_package_name: ${{ inputs.web_package_name }}
          target_stage:     staging

      - name: Deploy to staging (netlify)
        if: inputs.host == 'netlify'
        uses: therajanmaurya/mifos-x-actionhub-publish-web-kmp/netlify@v2.0.0
        with:
          web_package_name: ${{ inputs.web_package_name }}
          target_stage:     staging

      - name: Deploy to staging (vercel)
        if: inputs.host == 'vercel'
        uses: therajanmaurya/mifos-x-actionhub-publish-web-kmp/vercel@v2.0.0
        with:
          web_package_name: ${{ inputs.web_package_name }}
          target_stage:     staging

  stage-3-production:
    name: Stage 3 — Production (2 reviewers + wait timer)
    needs: [stage-2-staging]
    if: inputs.starting_rung == 'production' && !cancelled() && !failure()
    runs-on: ubuntu-latest
    environment: web-${{ inputs.host }}-production
    permissions: { contents: write, pages: write, id-token: write }
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production (gh-pages)
        if: inputs.host == 'gh-pages'
        uses: therajanmaurya/mifos-x-actionhub-publish-web-kmp/gh-pages@v2.0.0
        with:
          web_package_name: ${{ inputs.web_package_name }}
          target_stage:     production

      - name: Deploy to production (cloudflare-pages)
        if: inputs.host == 'cloudflare-pages'
        uses: therajanmaurya/mifos-x-actionhub-publish-web-kmp/cloudflare-pages@v2.0.0
        with:
          web_package_name: ${{ inputs.web_package_name }}
          target_stage:     production

      - name: Deploy to production (netlify)
        if: inputs.host == 'netlify'
        uses: therajanmaurya/mifos-x-actionhub-publish-web-kmp/netlify@v2.0.0
        with:
          web_package_name: ${{ inputs.web_package_name }}
          target_stage:     production

      - name: Deploy to production (vercel)
        if: inputs.host == 'vercel'
        uses: therajanmaurya/mifos-x-actionhub-publish-web-kmp/vercel@v2.0.0
        with:
          web_package_name: ${{ inputs.web_package_name }}
          target_stage:     production
